name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python modules
        run: python -m compileall src app tests run_monitor.py

      - name: Run complete pytest suite
        run: pytest -q

      - name: Run offline pipeline smoke test
        run: pytest tests/test_pipeline.py::test_pipeline_offline_smoke_uses_tmp_artifacts -q

      - name: Build Docker image
        run: docker build -t civicdata-guardian:ci .
